# Paperdoc Configuration
# Place this file at ~/.paperdoc/config.yml to customize

# Server port
port: 7321

# Model configuration
# Models are auto-detected from ~/.qvac/models/ and symlinked to ~/.paperdoc/models/
# You can override with absolute paths if needed
models:
  asr_live: "WHISPER_EN_TINY_Q8_0"          # Live streaming ASR, English-only (44MB)
  asr_batch: "PARAKEET_TDT_0_6B_V3_Q8_0"    # Batch transcription (750MB)
  diarization: "PARAKEET_SORTFORMER_4SPK_V2_1_Q8_0"  # Speaker diarization (140MB)
  llm: "QWEN3_1_7B_INST_Q4"                 # SOAP generation LLM (~1.1GB)

# UI settings
ui:
  theme: "light"                     # "light" or "dark"
  language: "en"                     # Currently English only

# Download settings
download:
  auto_download: true                # Auto-download missing models on first run
  parallel: false                    # Download models sequentially to avoid overwhelming the system

# Database
# SQLite database location: ~/.paperdoc/data.db
